services:
  librarr:
    build: .
    container_name: librarr
    restart: unless-stopped
    ports:
      - "5050:5050"
    volumes:
      - librarr-data:/data
      - /data/media/books/ebooks:/books/ebooks
      - /data/media/books/audiobooks:/books/audiobooks
      - /data/media/books/manga:/books/manga
    env_file:
      - .env
    environment:
      - LIBRARR_PORT=5050
      - LIBRARR_DB_PATH=/data/librarr.db

volumes:
  librarr-data:
